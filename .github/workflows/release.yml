name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Semver bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run - build and sign but skip GitHub Release creation and version commit"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  version:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 25

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.release_type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT -> $NEW_VERSION (${{ inputs.release_type }})"

  build-mac:
    name: Build (macOS)
    needs: version
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 25
          cache: npm

      - name: Apply version
        run: npm version "${{ needs.version.outputs.version }}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Import code signing certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          # Decode the certificate
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate into the keychain
          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain without UI prompt
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          # Add the keychain to the search list (prepend so it's found first)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Prepare App Store Connect API key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          # notarytool expects the key at ~/private_keys/AuthKey_<ID>.p8
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      - name: Restore provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p build
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > build/Vox_Profile.provisionprofile

      - name: Build app
        run: npm run build

      - name: Package and sign (DMG + zip)
        env:
          CSC_KEYCHAIN: ${{ env.KEYCHAIN_PATH }}
          APPLE_API_KEY: ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: npx electron-builder --mac dmg zip --arm64 --publish never

      - name: Clean up keychain
        if: always()
        run: |
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: vox-${{ needs.version.outputs.version }}-mac-arm64
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml
          if-no-files-found: error

  build-windows:
    name: Build (Windows)
    needs: version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 25
          cache: npm

      - name: Apply version
        run: npm version "${{ needs.version.outputs.version }}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Generate Windows icon from logo
        shell: pwsh
        run: |
          # Convert logo.png to icon.ico using magick (pre-installed on windows-latest)
          magick resources/logo.png -define icon:auto-resize=256,128,64,48,32,16 build/icon.ico

      - name: Build app
        run: npm run build

      - name: Package (NSIS installer)
        env:
          CSC_LINK: ${{ secrets.WIN_CERTIFICATE_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
        run: npx electron-builder --win nsis --x64 --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: vox-${{ needs.version.outputs.version }}-win-x64
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          if-no-files-found: error

  build-linux:
    name: Build (Linux)
    needs: version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 25
          cache: npm

      - name: Apply version
        run: npm version "${{ needs.version.outputs.version }}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Generate Linux icon from logo
        run: |
          sudo apt-get install -y imagemagick
          convert resources/logo.png -resize 1024x1024 build/icon.png

      - name: Build app
        run: npm run build

      - name: Package (AppImage x64)
        run: npx electron-builder --linux AppImage --x64 --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: vox-${{ needs.version.outputs.version }}-linux-x64
          path: |
            dist/*.AppImage
            dist/latest-linux.yml
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [version, build-mac, build-windows, build-linux]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 25
          cache: npm

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          pattern: vox-*

      - name: Prepare release assets
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          mkdir -p release

          # Move all build artifacts to release directory
          find artifacts -type f \( \
            -name "*.dmg" -o -name "*.zip" -o -name "*.exe" -o \
            -name "*.AppImage" -o \
            -name "*.blockmap" -o -name "latest-mac.yml" -o -name "latest.yml" -o \
            -name "latest-linux.yml" \
          \) -exec mv {} release/ \;

          # Create stable-named copies for releases/latest/download URLs
          DMG=$(find release -name "*.dmg" ! -name "Vox-mac-arm64.dmg" | head -1)
          ZIP=$(find release -name "*-mac.zip" | head -1)
          EXE=$(find release -name "*.exe" ! -name "Vox-win-x64.exe" ! -name "Vox-${VERSION}-x64.exe" | head -1)
          BLOCKMAP=$(find release -name "*.exe.blockmap" ! -name "Vox-${VERSION}-x64.exe.blockmap" | head -1)

          cp "$DMG" "release/Vox-mac-arm64.dmg"
          cp "$ZIP" "release/Vox-mac-arm64.zip"
          cp "$EXE" "release/Vox-win-x64.exe"

          # NSIS produces "Vox Setup X.Y.Z.exe" — create dash-named versioned copies
          # to match the naming convention used by electron-builder on macOS
          cp "$EXE" "release/Vox-${VERSION}-x64.exe"
          cp "$BLOCKMAP" "release/Vox-${VERSION}-x64.exe.blockmap"

          APPIMAGE=$(find release -name "*.AppImage" | head -1)
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "release/Vox-linux-x64.AppImage"
          fi

          ls -lh release/

      - name: Commit version bump
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          npm version "${{ needs.version.outputs.version }}" --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): bump version to ${{ needs.version.outputs.version }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          TAG="${{ needs.version.outputs.tag }}"

          git tag "$TAG"
          git push origin "$TAG"

          # Upload both versioned and stable-named assets so that
          # GitHub's built-in releases/latest/download/<asset> provides
          # permanent download URLs without a separate "latest" release.
          gh release create "$TAG" \
            --title "Vox $TAG" \
            --generate-notes \
            release/Vox-${VERSION}-arm64.dmg \
            release/Vox-${VERSION}-arm64-mac.zip \
            release/Vox-${VERSION}-arm64-mac.zip.blockmap \
            release/latest-mac.yml \
            release/Vox-mac-arm64.dmg \
            release/Vox-mac-arm64.zip \
            release/Vox-${VERSION}-x64.exe \
            release/Vox-${VERSION}-x64.exe.blockmap \
            release/latest.yml \
            release/Vox-win-x64.exe \
            release/Vox-linux-x64.AppImage \
            release/latest-linux.yml

          echo "Release created: $TAG"
